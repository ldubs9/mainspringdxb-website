name: igfetch Daily

on:
  schedule:
    - cron: '0 0 */3 * *' # every 3 days (~72 hours) at 00:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Instagram posts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 scripts/igfetch_fetch.py --username mainspring.dxb --count 10

      - name: Commit and push updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/instagram.json images/
          # Commit/push only when the tracked output actually changed. Gate on the
          # staged diff so the untracked debug dump (data/instagram_raw.json) can't
          # trigger a commit with nothing staged, which previously failed the job.
          if git diff --staged --quiet; then
            echo "No changes to Instagram posts; nothing to commit."
          else
            git commit -m "Update Instagram posts (igfetch)"
            git push
          fi
