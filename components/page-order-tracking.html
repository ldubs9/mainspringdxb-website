        <section class="page-section" id="page-order-tracking">
            <div class="order-tracking-section">
                <h2>Track Your Order</h2>
                <div class="checkout-form">
                    <div class="checkout-field">
                        <label>Order Reference *</label>
                        <input type="text" id="trackOrderRef" value="" placeholder="e.g. MS-XXXXXXXX" />
                    </div>
                    <div class="checkout-field">
                        <label>Phone Number *</label>
                        <input type="tel" id="trackPhone" placeholder="+971 5X XXX XXXX" />
                    </div>
                    <button class="checkout-confirm-btn" onclick="lookupOrder()">TRACK ORDER</button>
                </div>
                <div id="orderTrackingResult"></div>
            </div>
        </section>
